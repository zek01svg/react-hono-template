name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: false
        with:
          args: dir . --redact --verbose

      - name: Run format, lint, and typecheck concurrently
        run: bunx concurrently "bun run format" "bun run lint" "bun run typecheck"

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build
